name: CI

on:
  workflow_dispatch:

env:
  OPENWRT_VERSION: 25.12.5
  OPENWRT_TARGET: x86
  OPENWRT_SUBTARGET: "64"
  SDK_NAME: openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64
  PACKAGE_NAME: luci-app-lan-proxy-route

jobs:
  shell-tests:
    name: Local shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run local tests
        run: sh tests/run.sh

  package-build:
    name: Build OpenWrt package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3 python3-setuptools rsync \
            unzip zlib1g-dev file wget tar zstd

      - name: Download OpenWrt SDK
        run: |
          set -eu
          base_url="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          wget -q "${base_url}/${SDK_NAME}.tar.zst"
          tar --use-compress-program=unzstd -xf "${SDK_NAME}.tar.zst"
          mv "${SDK_NAME}" openwrt-sdk

      - name: Install feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package into SDK
        run: |
          set -eu
          mkdir -p "openwrt-sdk/package/${PACKAGE_NAME}"
          cp -a Makefile root "openwrt-sdk/package/${PACKAGE_NAME}/"

      - name: Build package
        working-directory: openwrt-sdk
        run: |
          echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" >> .config
          make defconfig
          make "package/${PACKAGE_NAME}/compile" V=s

      - name: Smoke test package contents
        run: |
          set -eu

          echo "Package candidates:"
          find openwrt-sdk/bin/packages -type f \( \
            -name "${PACKAGE_NAME}_*.ipk" -o \
            -name "${PACKAGE_NAME}-*.apk" -o \
            -name "${PACKAGE_NAME}_*.apk" \
          \) -print | sort

          pkg="$(find openwrt-sdk/bin/packages -type f \( \
            -name "${PACKAGE_NAME}_*.ipk" -o \
            -name "${PACKAGE_NAME}-*.apk" -o \
            -name "${PACKAGE_NAME}_*.apk" \
          \) -print -quit)"
          if [ -z "$pkg" ]; then
            echo "No package found for ${PACKAGE_NAME}. Available package files:" >&2
            find openwrt-sdk/bin/packages -maxdepth 8 -type f -print | sort >&2
            exit 1
          fi

          echo "Testing package: $pkg"
          file "$pkg"
          rm -rf pkg-check pkg-data
          mkdir -p pkg-check pkg-data

          case "$pkg" in
            *.ipk)
              (cd pkg-check && ar x "../$pkg")
              echo "IPK archive entries:"
              find pkg-check -maxdepth 1 -type f -print -exec file {} \;
              data_archive="$(find pkg-check -name 'data.tar*' -print -quit)"
              if [ -z "$data_archive" ]; then
                echo "No data.tar* archive found in IPK. Extracted entries:" >&2
                find pkg-check -maxdepth 2 -type f -print >&2
                exit 1
              fi
              echo "Found data archive: $data_archive"
              case "$data_archive" in
                *.tar) tar -xf "$data_archive" -C pkg-data ;;
                *.tar.gz) tar -xzf "$data_archive" -C pkg-data ;;
                *.tar.xz) tar -xJf "$data_archive" -C pkg-data ;;
                *.tar.zst) tar --use-compress-program=unzstd -xf "$data_archive" -C pkg-data ;;
                *) echo "Unsupported IPK data archive: $data_archive" >&2; exit 1 ;;
              esac
              ;;
            *.apk)
              apk_tool="$(find openwrt-sdk/staging_dir/host -type f -name apk -perm -111 -print -quit)"
              if [ -z "$apk_tool" ]; then
                echo "No SDK host apk tool found. Candidate host tools:" >&2
                find openwrt-sdk/staging_dir/host -maxdepth 4 -type f -name '*apk*' -print >&2
                exit 1
              fi

              echo "Using SDK apk tool: $apk_tool"
              "$apk_tool" --version || true
              "$apk_tool" --help | sed -n '1,120p' || true

              mkdir -p pkg-data/etc/apk
              touch pkg-data/etc/apk/world

              if ! "$apk_tool" \
                --root "$PWD/pkg-data" \
                --initdb \
                --keys-dir /dev/null \
                --repositories-file /dev/null \
                --allow-untrusted \
                --no-network \
                --force-broken-world \
                add --no-scripts "$PWD/$pkg"; then
                echo "Failed to install APK into temporary rootfs: $pkg" >&2
                echo "APK tool help:" >&2
                "$apk_tool" --help >&2 || true
                exit 1
              fi
              ;;
            *)
              echo "Unsupported package extension: $pkg" >&2
              exit 1
              ;;
          esac

          echo "Extracted package payload:"
          find pkg-data -maxdepth 8 -print | sort | sed -n '1,240p'

          require_file() {
            if [ ! -f "pkg-data/$1" ]; then
              echo "Missing file: /$1" >&2
              exit 1
            fi
          }

          require_exec() {
            if [ ! -x "pkg-data/$1" ]; then
              echo "Missing executable: /$1" >&2
              ls -l "pkg-data/$1" 2>/dev/null || true
              exit 1
            fi
          }

          require_exec etc/init.d/lan-proxy-route
          require_exec usr/share/lan-proxy-route/lan-proxy-route.sh
          require_exec usr/libexec/rpcd/lan-proxy-route
          require_file usr/share/luci/menu.d/luci-app-lan-proxy-route.json
          require_file usr/share/rpcd/acl.d/luci-app-lan-proxy-route.json
          require_file www/luci-static/resources/view/lan-proxy-route/overview.js

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-package
          path: |
            openwrt-sdk/bin/packages/**/*.ipk
            openwrt-sdk/bin/packages/**/*.apk
