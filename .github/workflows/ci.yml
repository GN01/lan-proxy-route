name: CI

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create git tag and GitHub Release after a successful build
        type: boolean
        default: true
      tag:
        description: Release tag (default v{PKG_VERSION}-r{PKG_RELEASE} from Makefile)
        type: string
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  OPENWRT_VERSION: 25.12.5
  OPENWRT_TARGET: x86
  OPENWRT_SUBTARGET: "64"
  SDK_NAME: openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64
  PACKAGE_NAME: luci-app-lan-proxy-route

jobs:
  shell-tests:
    name: Local shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run local tests
        run: sh tests/run.sh

  package-build:
    name: Build OpenWrt package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3 python3-setuptools rsync \
            unzip zlib1g-dev file wget tar zstd

      - name: Download OpenWrt SDK
        run: |
          set -eu
          base_url="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          wget -q "${base_url}/${SDK_NAME}.tar.zst"
          tar --use-compress-program=unzstd -xf "${SDK_NAME}.tar.zst"
          mv "${SDK_NAME}" openwrt-sdk

      - name: Install feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package into SDK
        run: |
          set -eu
          mkdir -p "openwrt-sdk/package/${PACKAGE_NAME}"
          cp -a Makefile root po "openwrt-sdk/package/${PACKAGE_NAME}/"

      - name: Build package
        working-directory: openwrt-sdk
        run: |
          echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" >> .config
          make defconfig
          make "package/${PACKAGE_NAME}/compile" V=s

      - name: Smoke test package contents
        run: |
          set -eu

          echo "Package candidates:"
          find openwrt-sdk/bin/packages -type f \( \
            -name "${PACKAGE_NAME}-*.apk" -o \
            -name "${PACKAGE_NAME}_*.apk" \
          \) -print | sort

          pkg="$(find openwrt-sdk/bin/packages -type f \( \
            -name "${PACKAGE_NAME}-*.apk" -o \
            -name "${PACKAGE_NAME}_*.apk" \
          \) -print -quit)"
          if [ -z "$pkg" ]; then
            echo "No package found for ${PACKAGE_NAME}. Available package files:" >&2
            find openwrt-sdk/bin/packages -maxdepth 8 -type f -print | sort >&2
            exit 1
          fi

          echo "Testing package: $pkg"
          file "$pkg"
          rm -rf pkg-data
          mkdir -p pkg-data

          apk_tool="$(find openwrt-sdk/staging_dir/host -type f -name apk -perm -111 -print -quit)"
          if [ -z "$apk_tool" ]; then
            echo "No SDK host apk tool found. Candidate host tools:" >&2
            find openwrt-sdk/staging_dir/host -maxdepth 4 -type f -name '*apk*' -print >&2
            exit 1
          fi

          echo "Using SDK apk tool: $apk_tool"
          "$apk_tool" --version || true

          # apk v3 packages use the ADB container format, so plain tar cannot read
          # them. Use `apk extract` to unpack the package payload for verification.
          # --allow-untrusted is required because SDK-built packages carry no
          # trusted signature.
          if ! "$apk_tool" extract --allow-untrusted --no-chown \
            --destination "$PWD/pkg-data" "$PWD/$pkg"; then
            echo "Failed to extract APK payload: $pkg" >&2
            exit 1
          fi

          echo "Extracted package payload:"
          find pkg-data -maxdepth 8 -print | sort | sed -n '1,240p'

          require_file() {
            if [ ! -f "pkg-data/$1" ]; then
              echo "Missing file: /$1" >&2
              exit 1
            fi
          }

          require_exec() {
            if [ ! -x "pkg-data/$1" ]; then
              echo "Missing executable: /$1" >&2
              ls -l "pkg-data/$1" 2>/dev/null || true
              exit 1
            fi
          }

          require_exec etc/init.d/lan-proxy-route
          require_exec usr/share/lan-proxy-route/lan-proxy-route.sh
          require_exec usr/share/lan-proxy-route/update-chnroute.sh
          require_exec usr/libexec/rpcd/lan-proxy-route
          require_file usr/share/luci/menu.d/luci-app-lan-proxy-route.json
          require_file usr/share/rpcd/acl.d/luci-app-lan-proxy-route.json
          require_file www/luci-static/resources/view/lan-proxy-route/overview.js
          require_file etc/lan-proxy-route/china_ip4.txt
          require_file etc/lan-proxy-route/china_ip4.ver

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-package
          path: openwrt-sdk/bin/packages/**/*.apk

      - name: Resolve release tag
        id: release_tag
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.publish_release }}" != "true" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ -n "${{ inputs.tag }}" ]; then
              tag="${{ inputs.tag }}"
            else
              version="$(grep '^PKG_VERSION:=' Makefile | cut -d= -f2)"
              release="$(grep '^PKG_RELEASE:=' Makefile | cut -d= -f2)"
              tag="v${version}-r${release}"
            fi
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Create git tag
        if: steps.release_tag.outputs.skip != 'true' && github.event_name == 'workflow_dispatch'
        run: |
          set -eu
          tag="${{ steps.release_tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally"
          else
            git tag -a "$tag" -m "Release $tag"
          fi
          git push origin "$tag"

      - name: Publish GitHub Release
        if: steps.release_tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${{ steps.release_tag.outputs.tag }}"
          files="$(find openwrt-sdk/bin/packages -type f -name "${PACKAGE_NAME}*.apk")"
          if [ -z "$files" ]; then
            echo "No package files to release" >&2
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # shellcheck disable=SC2086
            gh release upload "$tag" $files --clobber --repo "$GITHUB_REPOSITORY"
          else
            # shellcheck disable=SC2086
            gh release create "$tag" $files \
              --title "$tag" \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY"
          fi
